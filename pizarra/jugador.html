<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kymera - Perfil</title>
  <link rel="stylesheet" href="css/pizarra.css">
  <style>
    .personaje-panel {
      display: grid;
      grid-template-columns: 70px 1fr 70px;
      gap: 0.75rem;
      margin-bottom: 2rem;
      min-height: 550px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .items-col {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      justify-content: center;
      align-items: center;
    }

    .personaje-centro {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .personaje-render {
      width: 280px;
      height: 400px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: radial-gradient(ellipse at center, rgba(0,255,150,0.05) 0%, var(--bg-secondary) 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .personaje-render img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .personaje-render-placeholder {
      font-size: 5rem;
      opacity: 0.3;
    }

    .personaje-info {
      margin-top: 0.75rem;
      text-align: center;
    }

    .personaje-info h2 {
      color: var(--clase-monje);
      font-size: 1.3rem;
      margin-bottom: 0.15rem;
    }

    .personaje-info .detalle {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    /* Item slot: solo icono */
    .item-slot {
      width: 52px;
      height: 52px;
      border-radius: 6px;
      border: 2px solid var(--epic);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }

    .item-slot:hover {
      border-color: #ccc;
      transform: scale(1.08);
    }

    .item-slot-alerta {
      border-color: var(--stagger-intenso);
    }

    .item-slot img {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      display: block;
    }

    .item-slot .placeholder-icon {
      font-size: 1.4rem;
      opacity: 0.4;
    }

    .item-ilvl-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      font-size: 0.6rem;
      font-weight: 700;
      background: rgba(0,0,0,0.9);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* Tooltip propio (sin Wowhead) */
    .item-tooltip {
      display: none;
      position: absolute;
      z-index: 100;
      background: var(--bg-secondary);
      border: 1px solid var(--epic);
      border-radius: 6px;
      padding: 0.75rem;
      min-width: 220px;
      left: 110%;
      top: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .items-col:last-child .item-tooltip {
      left: auto;
      right: 110%;
    }

    .item-slot:hover .item-tooltip {
      display: block;
    }

    .tooltip-nombre {
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .tooltip-detalle {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .tooltip-alerta {
      color: var(--stagger-intenso);
      font-size: 0.8rem;
      margin-top: 0.3rem;
      font-weight: 600;
    }

    .tooltip-stat {
      font-size: 0.8rem;
      color: var(--text-primary);
      padding: 0.1rem 0;
    }

    .tooltip-procedencia {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.4rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
      font-style: italic;
    }

    /* Arma */
    .arma-slot-container {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      margin-top: 0.5rem;
    }

    /* Stats */
    .stats-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 2rem;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 2rem;
    }
    .stat-linea {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.85rem;
    }

    /* Talentos */
    .talentos-panel {
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    @media (max-width: 768px) {
      .personaje-panel { grid-template-columns: 60px 1fr 60px; max-width: 100%; }
      .item-slot { width: 44px; height: 44px; }
      .item-slot img { width: 36px; height: 36px; }
      .personaje-render { width: 200px; height: 280px; }
      .item-tooltip { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="nav-lateral">
      <a href="index.html" class="nav-logo">Wow Midnight</a>
      <a href="index.html">Panel</a>
      <a href="jugador.html" class="activo">Jugador</a>
      <a href="wowanalyzer.html">WoWAnalyzer</a>
      <a href="forja.html">Forja</a>
      <a href="boss.html">Boss</a>
      <a href="mazmorra.html">Mazmorra</a>
    </nav>

    <main class="contenido" id="app">
      <p style="color:var(--text-muted)">Cargando...</p>
    </main>
  </div>

  <script src="js/datos.js"></script>
  <script>
    // Iconos placeholder por ranura (hasta que la Action de Blizzard API los traiga)
    const ICONOS_PLACEHOLDER = {
      'Cabeza': '🪖', 'Cuello': '📿', 'Hombros': '🛡', 'Espalda': '🧣',
      'Pecho': '🥋', 'Muñecas': '⌚', 'Cintura': '🥏', 'Manos': '🧤',
      'Piernas': '👖', 'Pies': '👢', 'Anillo 1': '💍', 'Anillo 2': '💍',
      'Trinket 1': '🔮', 'Trinket 2': '🪶', 'Arma': '🏑',
    };

    // Equipo con datos del SimC profile
    const EQUIPO = [
      { pos: 'izq', ranura: 'Cabeza', id: 250015, ilvl: 276, nombre: 'Rostro temible de elegido de Ra-den', tier: true },
      { pos: 'izq', ranura: 'Cuello', id: 240950, ilvl: 285, nombre: 'Amuleto sin\'dorei magistral', crafted: true },
      { pos: 'izq', ranura: 'Hombros', id: 258581, ilvl: 272, nombre: 'Manto de sangrepluma' },
      { pos: 'izq', ranura: 'Espalda', id: 251206, ilvl: 276, nombre: 'Capa de tejido de flujo', alerta: 'Sin enchant' },
      { pos: 'izq', ranura: 'Pecho', id: 250018, ilvl: 289, nombre: 'Atuendo de batalla de elegido de Ra-den', tier: true },
      { pos: 'izq', ranura: 'Muñecas', id: 249327, ilvl: 263, nombre: 'Brazales de piel de Vacío', alerta: 'Sin enchant · ilvl baja' },
      { pos: 'izq', ranura: 'Cintura', id: 251082, ilvl: 276, nombre: 'Cincho de chascaparra' },

      { pos: 'der', ranura: 'Manos', id: 250016, ilvl: 289, nombre: 'Puñotruenos de elegido de Ra-den', tier: true },
      { pos: 'der', ranura: 'Piernas', id: 250014, ilvl: 276, nombre: 'Recorredores raudos de elegido de Ra-den', tier: true },
      { pos: 'der', ranura: 'Pies', id: 251210, ilvl: 276, nombre: 'Alpargatas de eclipse' },
      { pos: 'der', ranura: 'Anillo 1', id: 151311, ilvl: 266, nombre: 'Anillo del Triunvirato' },
      { pos: 'der', ranura: 'Anillo 2', id: 249369, ilvl: 263, nombre: 'Vínculo de la Luz' },
      { pos: 'der', ranura: 'Trinket 1', id: 264507, ilvl: 263, nombre: 'Crisol de energías erráticas' },
      { pos: 'der', ranura: 'Trinket 2', id: 250144, ilvl: 266, nombre: 'Pluma de alascuas' },

      { pos: 'arma', ranura: 'Arma', id: 245771, ilvl: 285, nombre: 'Bastón pica de Aln\'hara', crafted: true },
    ];

    const TALENTOS = {
      activo: 'CwQAi6cZM+HWADeySjzG9Lwx8DAAAwMbbGDzYWM2wMjBAAAAAAYZBzEzMwMMzmBmZmZY2GmxYZYZb22mthZBAA2QAAAmtZpZmZ2YYBgZGmGDAAYA',
      guardados: [
        { nombre: 'suuu', codigo: 'CwQAi6cZM+HWADeySjzG9Lwx8DAAAgZbzYGPwYWmxGmZMAAAAAAALLYgZGMzwYzAzMzMMbjZGjlhltZbb2GmFAAYDAAAMbziZmZ2YYDgZGGjBAAMA' },
        { nombre: 'kiira', codigo: 'CwQAi6cZM+HWADeySjzG9Lwx8DAAAwMbbGDzYWM2wMjBAAAAAAYZBzgZGYGmZzAzMzMMbDzYsMssNbbz2wsAAAbAAAgZbWMzMzGDLAMzwYMAAgB' },
      ]
    };

    function renderSlot(item, enrichedItems) {
      const alertaClass = item.alerta ? 'item-slot-alerta' : '';

      // Buscar datos enriquecidos de la API de Blizzard (si existen)
      const enriched = enrichedItems?.find(e => e.item_id === item.id);
      const iconUrl = enriched?.icono;
      const procedencia = enriched?.procedencia || null;

      const iconHtml = iconUrl
        ? `<img src="${iconUrl}" alt="${item.nombre}" />`
        : `<span class="placeholder-icon">${ICONOS_PLACEHOLDER[item.ranura] || '?'}</span>`;

      // Construir tooltip con datos enriquecidos si existen
      let tooltipContent = '';
      if (enriched) {
        tooltipContent = `
          <div class="tooltip-nombre" style="color:${enriched.calidad_color || 'var(--epic)'}">${enriched.nombre_es}</div>
          <div class="tooltip-detalle">${enriched.ranura_tipo || item.ranura} · ${enriched.tipo || ''}</div>
          <div class="tooltip-stat" style="color:var(--clase-monje)">Nivel de objeto ${item.ilvl}</div>
          ${enriched.vinculacion ? `<div class="tooltip-detalle">${enriched.vinculacion}</div>` : ''}
          ${enriched.armadura_display ? `<div class="tooltip-stat">${enriched.armadura_display}</div>` : (enriched.armadura ? `<div class="tooltip-stat">${enriched.armadura} p. de armadura</div>` : '')}
          ${(enriched.stats || []).map(s => `<div class="tooltip-stat">${s.display || '+' + s.valor + ' ' + s.tipo}</div>`).join('')}
          ${enriched.set ? `<div class="tooltip-stat" style="color:var(--epic);margin-top:0.3rem">${enriched.set}</div>` : ''}
          ${(enriched.enchants || []).map(e => `<div class="tooltip-stat" style="color:var(--clase-monje)">${e}</div>`).join('')}
          ${(enriched.gemas || []).map(g => `<div class="tooltip-stat" style="color:var(--stat-haste)">${g}</div>`).join('')}
          ${item.crafted ? '<div class="tooltip-stat" style="color:var(--accent)">Fabricado · Calidad 5</div>' : ''}
          ${item.alerta ? `<div class="tooltip-alerta">${item.alerta}</div>` : ''}
          <div class="tooltip-detalle" style="margin-top:0.4rem;opacity:0.5">ID: ${item.id}</div>
        `;
      } else {
        tooltipContent = `
          <div class="tooltip-nombre" style="color:var(--epic)">${item.nombre}</div>
          <div class="tooltip-detalle">${item.ranura} · ilvl ${item.ilvl}</div>
          ${item.alerta ? `<div class="tooltip-alerta">${item.alerta}</div>` : ''}
        `;
      }

      return `
        <div class="item-slot ${alertaClass}">
          ${iconHtml}
          <span class="item-ilvl-badge ${claseIlvl(item.ilvl)}">${item.ilvl}</span>
          <div class="item-tooltip">${tooltipContent}</div>
        </div>
      `;
    }

    async function render() {
      const app = document.getElementById('app');

      // Intentar cargar datos enriquecidos de la API de Blizzard
      const enrichedData = await cargarJSON('datos/jugadores/kymera.json');
      const enrichedItems = enrichedData?.equipo || null;
      const renderUrl = enrichedData?.personaje?.media?.render
        || enrichedData?.personaje?.media?.main
        || enrichedData?.personaje?.media?.['main-raw']
        || null;

      const itemsIzq = EQUIPO.filter(e => e.pos === 'izq');
      const itemsDer = EQUIPO.filter(e => e.pos === 'der');
      const arma = EQUIPO.find(e => e.pos === 'arma');

      const renderHtml = renderUrl
        ? `<img src="${renderUrl}" alt="Kymera" />`
        : '<div class="personaje-render-placeholder">🍺</div>';

      app.innerHTML = `
        <div class="personaje-panel">
          <div class="items-col">
            ${itemsIzq.map(i => renderSlot(i, enrichedItems)).join('')}
          </div>

          <div class="personaje-centro">
            <div class="personaje-render">${renderHtml}</div>
            <div class="personaje-info">
              <h2>Kymera</h2>
              <div class="detalle">Enano · Maestro cervecero · Nivel 90 <span class="tag tag-tank">TANK</span></div>
              <div class="detalle" style="margin-top:0.25rem;">
                Zul'jin (EU) · ilvl <strong class="ilvl ilvl-medio">275</strong> · Tier <strong style="color:var(--epic)">4p</strong>
              </div>
            </div>
          </div>

          <div class="items-col">
            ${itemsDer.map(i => renderSlot(i, enrichedItems)).join('')}
          </div>

          <div class="arma-slot-container">
            ${arma ? renderSlot(arma, enrichedItems) : ''}
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-panel">
          <h3 class="seccion-titulo">Atributos</h3>
          <div class="stats-grid">
            <div>
              <div class="stat-linea"><span>Agilidad</span><span class="stat-valor">1.918</span></div>
              <div class="stat-linea"><span>Aguante</span><span class="stat-valor">30.547</span></div>
              <div class="stat-linea"><span>Armadura</span><span class="stat-valor">1.271</span></div>
              <div class="stat-linea"><span>Aplazar (Stagger)</span><span class="stat-valor" style="color:var(--clase-monje)">43%</span></div>
            </div>
            <div>
              <div class="stat-linea"><span style="color:var(--stat-crit)">Golpe cr&iacute;tico</span><span>22%</span></div>
              <div class="stat-linea"><span style="color:var(--stat-haste)">Celeridad</span><span>18%</span></div>
              <div class="stat-linea"><span style="color:var(--stat-mastery)">Maestr&iacute;a</span><span>20%</span></div>
              <div class="stat-linea"><span style="color:var(--stat-vers)">Versatilidad</span><span>12%</span></div>
              <div class="stat-linea"><span>Esquivar</span><span>17%</span></div>
              <div class="stat-linea"><span>Parar</span><span>3%</span></div>
            </div>
          </div>
        </div>

        <!-- Talentos -->
        <div class="talentos-panel seccion">
          <h3 class="seccion-titulo">Talentos</h3>
          <div class="tarjeta" style="padding:1.25rem;">
            <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1rem;">
              <a href="https://www.wowhead.com/talent-calc/monk/brewmaster/${TALENTOS.activo}"
                 target="_blank"
                 style="padding:0.5rem 1rem;background:var(--clase-monje);color:#000;border-radius:6px;
                        text-decoration:none;font-weight:600;font-size:0.85rem;">
                Build activa
              </a>
              ${TALENTOS.guardados.map(t => `
                <a href="https://www.wowhead.com/talent-calc/monk/brewmaster/${t.codigo}"
                   target="_blank"
                   style="padding:0.5rem 1rem;background:var(--bg-secondary);border:1px solid var(--border);
                          color:var(--text-secondary);border-radius:6px;text-decoration:none;font-size:0.85rem;">
                  ${t.nombre}
                </a>
              `).join('')}
            </div>
            <details>
              <summary style="cursor:pointer;color:var(--text-muted);font-size:0.8rem;">Talent string</summary>
              <code style="display:block;margin-top:0.5rem;padding:0.75rem;background:var(--bg-secondary);
                           border-radius:4px;font-size:0.7rem;word-break:break-all;color:var(--text-muted);">
                ${TALENTOS.activo}
              </code>
            </details>
          </div>
        </div>

        <!-- Alertas -->
        ${EQUIPO.filter(e => e.alerta).length ? `
        <div class="seccion" style="max-width:700px;margin:0 auto;">
          <h3 class="seccion-titulo">Alertas</h3>
          ${EQUIPO.filter(e => e.alerta).map(e => `
            <div class="alerta">${e.ranura}: ${e.alerta}</div>
          `).join('')}
        </div>` : ''}
      `;
    }

    render();
  </script>
</body>
</html>
