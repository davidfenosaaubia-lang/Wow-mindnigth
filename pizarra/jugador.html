<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kymera - Perfil</title>
  <link rel="stylesheet" href="css/pizarra.css">
  <!-- Wowhead tooltips: muestra stats, procedencia, todo en español -->
  <script>const whTooltips = {colorLinks: true, iconizeLinks: true, renameLinks: true};</script>
  <script src="https://wow.zamimg.com/js/tooltips.js"></script>
  <style>
    /* Layout de personaje estilo WoW */
    .personaje-panel {
      display: grid;
      grid-template-columns: 70px 1fr 70px;
      gap: 0.75rem;
      margin-bottom: 2rem;
      min-height: 550px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Columnas de items */
    .items-izq, .items-der {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      justify-content: center;
      align-items: center;
    }

    /* Centro: personaje */
    .personaje-centro {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .personaje-render {
      width: 280px;
      height: 420px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: radial-gradient(ellipse at center, rgba(0,255,150,0.05) 0%, var(--bg-secondary) 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .personaje-render img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .personaje-render-placeholder {
      font-size: 6rem;
      opacity: 0.3;
    }

    .personaje-nombre-central {
      margin-top: 0.75rem;
      text-align: center;
    }

    .personaje-nombre-central h2 {
      color: var(--clase-monje);
      font-size: 1.3rem;
      margin-bottom: 0.15rem;
    }

    .personaje-nombre-central .detalle {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    /* Slot de item */
    .item-slot {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.3rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: background 0.15s, border-color 0.15s;
      min-height: 52px;
    }

    .item-slot:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255,255,255,0.15);
    }

    .item-slot-alerta {
      border-color: rgba(255,68,68,0.4);
      background: rgba(255,68,68,0.05);
    }

    .item-slot a {
      display: flex;
      align-items: center;
      text-decoration: none;
      font-size: 0;
    }

    /* Wowhead pone iconos de 18px por defecto, forzar más grandes */
    .item-slot a img,
    .item-slot a .iconlarge,
    .item-slot a .iconmedium,
    .item-slot a .iconsmall {
      width: 40px !important;
      height: 40px !important;
    }

    .item-slot .item-ilvl-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      font-size: 0.6rem;
      font-weight: 700;
      background: rgba(0,0,0,0.8);
      padding: 0.1rem 0.25rem;
      border-radius: 2px;
      font-variant-numeric: tabular-nums;
    }

    .item-wrapper {
      position: relative;
      display: inline-flex;
    }

    .item-ilvl {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* Stats del personaje */
    .stats-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 2rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 2rem;
    }
    .stat-linea {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.85rem;
    }
    .stat-nombre { color: var(--text-secondary); }
    .stat-valor { font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Arma bottom */
    .arma-slot {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .arma-slot .item-slot {
      flex: 0 1 300px;
    }

    /* Ranura label */
    .ranura-label {
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @media (max-width: 900px) {
      .personaje-panel {
        grid-template-columns: 1fr;
      }
      .items-der .item-slot {
        flex-direction: row;
        text-align: left;
      }
      .personaje-render {
        width: 200px;
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="nav-lateral">
      <a href="index.html" class="nav-logo">Wow Midnight</a>
      <a href="index.html">Panel</a>
      <a href="jugador.html" class="activo">Jugador</a>
      <a href="wowanalyzer.html">WoWAnalyzer</a>
      <a href="forja.html">Forja</a>
      <a href="boss.html">Boss</a>
      <a href="mazmorra.html">Mazmorra</a>
    </nav>

    <main class="contenido" id="app">
      <p style="color:var(--text-muted)">Cargando perfil...</p>
    </main>
  </div>

  <script src="js/datos.js"></script>
  <script>
    // Datos del equipo con IDs completos del SimC para tooltips correctos
    // bonus_id hace que Wowhead muestre el ilvl real (con upgrades)
    // ench= muestra el enchant, gems= muestra las gemas
    const EQUIPO = [
      // Lado izquierdo
      { pos: 'izq', ranura: 'Cabeza', id: 250015, ilvl: 276, nombre: 'Rostro temible de elegido de Ra-den', calidad: 'epico', tier: true, enchant: true,
        wh: 'item=250015&bonus=13334:6652:12667:12798:13338:13575:3161&ench=7961' },
      { pos: 'izq', ranura: 'Cuello', id: 240950, ilvl: 285, nombre: 'Amuleto sin\'dorei magistral', calidad: 'epico', crafted: true, gema: true,
        wh: 'item=240950&bonus=12214:12497:12066:12686:8960:8795:13622:13667&gems=240983' },
      { pos: 'izq', ranura: 'Hombros', id: 258581, ilvl: 272, nombre: 'Manto de sangrepluma', calidad: 'epico',
        wh: 'item=258581&bonus=13440:6652:13577:12699:12797' },
      { pos: 'izq', ranura: 'Espalda', id: 251206, ilvl: 276, nombre: 'Capa de tejido de flujo', calidad: 'epico', alerta: 'Sin enchant',
        wh: 'item=251206&bonus=13440:6652:13577:12699:12798' },
      { pos: 'izq', ranura: 'Pecho', id: 250018, ilvl: 289, nombre: 'Atuendo de batalla de elegido de Ra-den', calidad: 'epico', tier: true, enchant: true,
        wh: 'item=250018&bonus=12806:43:13440:13336:13575:3174&ench=7987' },
      { pos: 'izq', ranura: 'Muñecas', id: 249327, ilvl: 263, nombre: 'Brazales de piel de Vacío', calidad: 'epico', alerta: 'Sin enchant',
        wh: 'item=249327&bonus=6652:12667:13577:13334:12794' },
      { pos: 'izq', ranura: 'Cintura', id: 251082, ilvl: 276, nombre: 'Cincho de chascaparra', calidad: 'epico',
        wh: 'item=251082&bonus=13440:42:12667:13577:12699:12798' },

      // Lado derecho
      { pos: 'der', ranura: 'Manos', id: 250016, ilvl: 289, nombre: 'Puñotruenos de elegido de Ra-den', calidad: 'epico', tier: true,
        wh: 'item=250016&bonus=13337:13440:6652:13574:12806' },
      { pos: 'der', ranura: 'Piernas', id: 250014, ilvl: 276, nombre: 'Recorredores raudos de elegido de Ra-den', calidad: 'epico', tier: true, enchant: true,
        wh: 'item=250014&bonus=6652:12798:13339:13575:3161&ench=8159' },
      { pos: 'der', ranura: 'Pies', id: 251210, ilvl: 276, nombre: 'Alpargatas de eclipse', calidad: 'epico', enchant: true,
        wh: 'item=251210&bonus=13440:6652:13577:12699:12798&ench=7993' },
      { pos: 'der', ranura: 'Anillo 1', id: 151311, ilvl: 266, nombre: 'Anillo del Triunvirato', calidad: 'epico', enchant: true, gema: true,
        wh: 'item=151311&bonus=12795:13440:6652:13668:12699&ench=8027&gems=240914' },
      { pos: 'der', ranura: 'Anillo 2', id: 249369, ilvl: 263, nombre: 'Vínculo de la Luz', calidad: 'epico', enchant: true, gema: true,
        wh: 'item=249369&bonus=6652:13668:13333:12790&ench=8023&gems=240882' },
      { pos: 'der', ranura: 'Trinket 1', id: 264507, ilvl: 263, nombre: 'Crisol de energías erráticas', calidad: 'epico',
        wh: 'item=264507&bonus=12790' },
      { pos: 'der', ranura: 'Trinket 2', id: 250144, ilvl: 266, nombre: 'Pluma de alascuas', calidad: 'epico',
        wh: 'item=250144&bonus=12795:13440:6652:12699' },

      // Arma
      { pos: 'arma', ranura: 'Arma', id: 245771, ilvl: 285, nombre: 'Bastón pica de Aln\'hara', calidad: 'epico', crafted: true, enchant: true,
        wh: 'item=245771&bonus=12214:12497:12066:13640:8960:8795:13622:13667&ench=8039' },
    ];

    // Talentos del personaje
    const TALENTOS = {
      activo: 'CwQAi6cZM+HWADeySjzG9Lwx8DAAAwMbbGDzYWM2wMjBAAAAAAYZBzEzMwMMzmBmZmZY2GmxYZYZb22mthZBAA2QAAAmtZpZmZ2YYBgZGmGDAAYA',
      guardados: [
        { nombre: 'suuu', codigo: 'CwQAi6cZM+HWADeySjzG9Lwx8DAAAgZbzYGPwYWmxGmZMAAAAAAALLYgZGMzwYzAzMzMMbjZGjlhltZbb2GmFAAYDAAAMbziZmZ2YYDgZGGjBAAMA' },
        { nombre: 'kiira', codigo: 'CwQAi6cZM+HWADeySjzG9Lwx8DAAAwMbbGDzYWM2wMjBAAAAAAYZBzgZGYGmZzAzMzMMbDzYsMssNbbz2wsAAAbAAAgZbWMzMzGDLAMzwYMAAgB' },
      ]
    };

    function renderSlot(item) {
      const alertaClass = item.alerta ? 'item-slot-alerta' : '';
      const wowheadUrl = `https://es.wowhead.com/item=${item.id}`;
      const whData = item.wh ? `${item.wh}&domain=es` : `item=${item.id}&domain=es`;

      return `
        <div class="item-slot ${alertaClass}" title="${item.ranura}: ${item.nombre} (${item.ilvl})">
          <div class="item-wrapper">
            <a href="${wowheadUrl}" data-wowhead="${whData}&iconSize=large" target="_blank"></a>
            <span class="item-ilvl-badge ${claseIlvl(item.ilvl)}">${item.ilvl}</span>
          </div>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById('app');

      const itemsIzq = EQUIPO.filter(e => e.pos === 'izq');
      const itemsDer = EQUIPO.filter(e => e.pos === 'der');
      const arma = EQUIPO.find(e => e.pos === 'arma');

      app.innerHTML = `
        <!-- Panel de personaje -->
        <div class="personaje-panel">
          <!-- Columna izquierda -->
          <div class="items-izq">
            ${itemsIzq.map(renderSlot).join('')}
          </div>

          <!-- Centro: personaje -->
          <div class="personaje-centro">
            <div class="personaje-render" id="render-container">
              <div class="personaje-render-placeholder">🍺</div>
            </div>
            <div class="personaje-nombre-central">
              <h2>Kymera</h2>
              <div class="detalle">
                Enano &middot; Maestro cervecero &middot; Nivel 90
                <span class="tag tag-tank" style="margin-left:0.3rem;">TANK</span>
              </div>
              <div class="detalle" style="margin-top:0.25rem;">
                Zul'jin (EU) &middot; ilvl <strong class="ilvl ilvl-medio">275</strong> &middot; Tier <strong style="color:var(--epic)">4p</strong>
              </div>
            </div>
          </div>

          <!-- Columna derecha -->
          <div class="items-der">
            ${itemsDer.map(renderSlot).join('')}
          </div>

          <!-- Arma abajo -->
          <div class="arma-slot">
            ${arma ? renderSlot(arma) : ''}
          </div>
        </div>

        <!-- Stats del personaje -->
        <div class="stats-panel">
          <h3 class="seccion-titulo">Atributos y estad&iacute;sticas</h3>
          <div class="stats-grid">
            <div>
              <div class="stat-linea">
                <span class="stat-nombre">Agilidad</span>
                <span class="stat-valor">1.918</span>
              </div>
              <div class="stat-linea">
                <span class="stat-nombre">Aguante</span>
                <span class="stat-valor">30.547</span>
              </div>
              <div class="stat-linea">
                <span class="stat-nombre">Armadura</span>
                <span class="stat-valor">1.271</span>
              </div>
              <div class="stat-linea">
                <span class="stat-nombre">Aplazar (Stagger)</span>
                <span class="stat-valor" style="color:var(--clase-monje)">43%</span>
              </div>
            </div>
            <div>
              <div class="stat-linea">
                <span class="stat-nombre" style="color:var(--stat-crit)">Golpe cr&iacute;tico</span>
                <span class="stat-valor">22%</span>
              </div>
              <div class="stat-linea">
                <span class="stat-nombre" style="color:var(--stat-haste)">Celeridad</span>
                <span class="stat-valor">18%</span>
              </div>
              <div class="stat-linea">
                <span class="stat-nombre" style="color:var(--stat-mastery)">Maestr&iacute;a</span>
                <span class="stat-valor">20%</span>
              </div>
              <div class="stat-linea">
                <span class="stat-nombre" style="color:var(--stat-vers)">Versatilidad</span>
                <span class="stat-valor">12%</span>
              </div>
              <div class="stat-linea">
                <span class="stat-nombre">Esquivar</span>
                <span class="stat-valor">17%</span>
              </div>
              <div class="stat-linea">
                <span class="stat-nombre">Parar</span>
                <span class="stat-valor">3%</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Alertas -->
        <div class="seccion">
          <h3 class="seccion-titulo">Alertas</h3>
          ${EQUIPO.filter(e => e.alerta).map(e => `
            <div class="alerta">${e.ranura}: ${e.alerta}</div>
          `).join('')}
        </div>

        <!-- Talentos -->
        <div class="seccion">
          <h3 class="seccion-titulo">Talentos</h3>
          <div class="tarjeta" style="padding:1.25rem;">
            <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">
              <a href="https://es.wowhead.com/talent-calc/monk/brewmaster/${TALENTOS.activo}"
                 target="_blank"
                 style="padding:0.5rem 1rem;background:var(--clase-monje);color:#000;border-radius:6px;
                        text-decoration:none;font-weight:600;font-size:0.85rem;">
                Build activa &rarr; Ver en Wowhead
              </a>
              ${TALENTOS.guardados.map(t => `
                <a href="https://es.wowhead.com/talent-calc/monk/brewmaster/${t.codigo}"
                   target="_blank"
                   style="padding:0.5rem 1rem;background:var(--bg-secondary);border:1px solid var(--border);
                          color:var(--text-secondary);border-radius:6px;text-decoration:none;font-size:0.85rem;">
                  ${t.nombre} &rarr; Wowhead
                </a>
              `).join('')}
            </div>
            <div style="font-size:0.8rem;color:var(--text-muted);">
              Haz clic en cualquier build para abrirla en el calculador de talentos de Wowhead.
              Puedes modificarla all&iacute; y copiar el string de importaci&oacute;n para pegarlo en el juego.
            </div>
            <details style="margin-top:1rem;">
              <summary style="cursor:pointer;color:var(--text-secondary);font-size:0.8rem;">Talent string (para importar en juego)</summary>
              <code style="display:block;margin-top:0.5rem;padding:0.75rem;background:var(--bg-secondary);
                           border-radius:4px;font-size:0.7rem;word-break:break-all;color:var(--text-muted);">
                ${TALENTOS.activo}
              </code>
            </details>
          </div>
        </div>
      `;

      // Intentar cargar imagen del personaje desde datos enriquecidos
      cargarJSON('datos/jugadores/kymera.json').then(data => {
        if (data && data.personaje && data.personaje.media) {
          const renderUrl = data.personaje.media.render || data.personaje.media.main || data.personaje.media['main-raw'];
          if (renderUrl) {
            const container = document.getElementById('render-container');
            container.innerHTML = `<img src="${renderUrl}" alt="Kymera" />`;
          }
        }
      });

      // Refrescar tooltips de Wowhead
      if (typeof $WowheadPower !== 'undefined') {
        $WowheadPower.refreshLinks();
      }
    }

    render();
  </script>
</body>
</html>
