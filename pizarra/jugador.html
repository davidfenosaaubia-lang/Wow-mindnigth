<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizarra - Perfil de Jugador</title>
  <link rel="stylesheet" href="css/pizarra.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="layout">
    <nav class="nav-lateral">
      <a href="index.html" class="nav-logo">Wow Midnight</a>
      <a href="index.html">Panel</a>
      <a href="jugador.html?nombre=kymera" class="activo">Jugador</a>
      <a href="comparar.html">Comparar</a>
      <a href="boss.html">Boss</a>
      <a href="mazmorra.html">Mazmorra</a>
    </nav>

    <main class="contenido" id="app">
      <p class="text-muted">Cargando datos...</p>
    </main>
  </div>

  <script src="js/datos.js"></script>
  <script>
    async function renderPerfil() {
      const app = document.getElementById('app');
      const datos = await cargarJSON(RUTAS.analisisKymera);

      if (!datos) {
        app.innerHTML = '<p>No se pudieron cargar los datos del jugador.</p>';
        return;
      }

      const p = datos.personaje;
      const eq = datos.equipo;

      // Header
      let html = `
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem;">
          <div class="clase-indicator" style="background:var(--clase-monje); height:50px;"></div>
          <div>
            <h1 class="titulo-pagina">${p.nombre}</h1>
            <div class="subtitulo">
              ${p.spec} &middot; ${p.servidor} &middot; ilvl ~${eq.ilvl_estimado}
              <span class="tag tag-tank">TANK</span>
            </div>
          </div>
        </div>
      `;

      // Alertas
      const enchantsFaltantes = Object.entries(eq.encantamientos)
        .filter(([_, v]) => v.startsWith('NO'))
        .map(([k, _]) => k.replace(/_/g, ' '));

      if (enchantsFaltantes.length > 0) {
        html += `<div class="alerta">Faltan encantamientos: ${enchantsFaltantes.join(', ')}</div>`;
      }

      // Mejoras inmediatas
      if (datos.mejoras_inmediatas && datos.mejoras_inmediatas.length > 0) {
        html += `<div class="seccion"><h2 class="seccion-titulo">Mejoras inmediatas</h2>`;
        datos.mejoras_inmediatas.forEach(m => {
          html += `<div class="mejora">${m}</div>`;
        });
        html += `</div>`;
      }

      // Equipo - Tier Set
      html += `
        <div class="seccion">
          <h2 class="seccion-titulo">Tier Set: ${eq.tier_set.set}</h2>
          <div class="tarjeta" style="margin-bottom:1rem;">
            <strong>${eq.tier_set.bonus}</strong>
            <table class="tabla-equipo" style="margin-top:0.75rem;">
              <tr><th>Ranura</th><th>ilvl</th><th>Nombre</th></tr>
              ${eq.tier_set.piezas.map(p => `
                <tr>
                  <td>${p.ranura}</td>
                  <td class="ilvl ${claseIlvl(p.ilvl)}">${p.ilvl}</td>
                  <td>${p.nombre_es}</td>
                </tr>
              `).join('')}
            </table>
            <p style="color:var(--text-muted);font-size:0.8rem;margin-top:0.5rem;">${eq.tier_set.notas}</p>
          </div>
        </div>
      `;

      // Crafted
      html += `
        <div class="seccion">
          <h2 class="seccion-titulo">Objetos fabricados</h2>
          <table class="tabla-equipo">
            <tr><th>Ranura</th><th>ilvl</th><th>Nombre</th><th>Stats</th></tr>
            ${eq.crafted.map(c => `
              <tr>
                <td>${c.ranura}</td>
                <td class="ilvl ${claseIlvl(c.ilvl)}">${c.ilvl}</td>
                <td>${c.nombre_es}</td>
                <td style="color:var(--text-secondary)">${c.stats}</td>
              </tr>
            `).join('')}
          </table>
        </div>
      `;

      // Trinkets
      html += `
        <div class="seccion">
          <h2 class="seccion-titulo">Abalorios</h2>
          <table class="tabla-equipo">
            <tr><th>Nombre</th><th>ilvl</th></tr>
            ${eq.trinkets.map(t => `
              <tr>
                <td>${t.nombre_es}</td>
                <td class="ilvl ${claseIlvl(t.ilvl)}">${t.ilvl}</td>
              </tr>
            `).join('')}
          </table>
        </div>
      `;

      // Puntos débiles
      html += `
        <div class="seccion">
          <h2 class="seccion-titulo">Puntos d&eacute;biles del equipo</h2>
          <table class="tabla-equipo">
            <tr><th>Ranura</th><th>ilvl</th><th>Nombre</th><th>Nota</th></tr>
            ${eq.puntos_debiles.map(pd => `
              <tr>
                <td>${pd.ranura}</td>
                <td class="ilvl ilvl-bajo">${pd.ilvl}</td>
                <td>${pd.nombre_es}</td>
                <td style="color:var(--text-muted)">${pd.comentario || ''}</td>
              </tr>
            `).join('')}
          </table>
        </div>
      `;

      // Encantamientos y gemas
      html += `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
          <div class="seccion">
            <h2 class="seccion-titulo">Encantamientos</h2>
            <table class="tabla-equipo">
              ${Object.entries(eq.encantamientos).map(([ranura, estado]) => `
                <tr>
                  <td>${ranura.replace(/_/g, ' ')}</td>
                  <td><span class="tag ${estado.startsWith('SI') ? 'tag-si' : 'tag-no'}">${estado.startsWith('SI') ? 'SI' : 'FALTA'}</span></td>
                </tr>
              `).join('')}
            </table>
          </div>
          <div class="seccion">
            <h2 class="seccion-titulo">Gemas</h2>
            <table class="tabla-equipo">
              ${Object.entries(eq.gemas).map(([ranura, estado]) => `
                <tr>
                  <td>${ranura.replace(/_/g, ' ')}</td>
                  <td><span class="tag tag-si">${estado}</span></td>
                </tr>
              `).join('')}
            </table>
          </div>
        </div>
      `;

      // Observaciones
      if (datos.observaciones && datos.observaciones.length > 0) {
        html += `
          <div class="seccion">
            <h2 class="seccion-titulo">Observaciones</h2>
            ${datos.observaciones.map(o => `<p style="margin-bottom:0.5rem;color:var(--text-secondary);">- ${o}</p>`).join('')}
          </div>
        `;
      }

      app.innerHTML = html;
    }

    renderPerfil();
  </script>
</body>
</html>
