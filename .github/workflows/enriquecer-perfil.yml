name: Enriquecer perfil con datos de Blizzard API

on:
  workflow_dispatch:
    inputs:
      perfil:
        description: 'Ruta al archivo .simc'
        required: true
        default: 'conocimiento/monje/perfiles/kymera-brewmaster-2026-04-09.simc'

permissions:
  contents: write

jobs:
  enriquecer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Enriquecer perfil
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: |
          python3 scripts/enriquecer-perfil.py \
            --perfil "${{ github.event.inputs.perfil }}" \
            2>&1 | tee pizarra/datos/jugadores/ultimo-enriquecer-log.txt

      - name: Commit y push
        run: |
          git config user.name "Perfil Bot"
          git config user.email "perfil-bot@users.noreply.github.com"
          git add pizarra/datos/
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Enriquecer perfil - $(date +%Y-%m-%d)"
            git push
          fi
