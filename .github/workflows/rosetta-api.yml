name: Actualizar Rosetta desde Blizzard API

# Se ejecuta manualmente o cuando quieras
on:
  workflow_dispatch:  # Botón manual en GitHub
  schedule:
    - cron: '0 6 * * 3'  # Cada miércoles a las 6:00 UTC (después del reset EU)

permissions:
  contents: write

jobs:
  actualizar-rosetta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar Rosetta API
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: python3 scripts/rosetta-api.py --todo 2>&1 | tee rosetta/api/ultimo-log.txt

      - name: Commit y push
        run: |
          git config user.name "Rosetta Bot"
          git config user.email "rosetta-bot@users.noreply.github.com"
          git add rosetta/api/
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Actualizar Rosetta API - datos $(date +%Y-%m-%d)"
            git push
          fi
